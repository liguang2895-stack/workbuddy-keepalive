# ============================================
# WorkBuddy KeepAlive - GitHub Actions 工作流
# ============================================
# 每 10 分钟启动一次 Chromium 浏览器，打开 WorkBuddy AI 对话页面，
# 保持 WebSocket 连接活跃，防止服务器因空闲而休眠。
#
# 前置条件：
#   1. 在本地运行 npm run login 完成微信扫码登录
#   2. 运行 npm run session-export 导出会话数据
#   3. 添加 GitHub Secrets：
#      - SESSION_DATA: 粘贴 session-export 输出的内容
#      - TASK_ID: 你的会话数字 ID
#   4. 仓库已设为 Public（免费用户无限 Actions 分钟数）
# ============================================

name: WorkBuddy KeepAlive

on:
  schedule:
    # 每 10 分钟运行一次（服务器 15 分钟才休眠，10 分钟间隔安全）
    - cron: '*/10 * * * *'
  workflow_dispatch:

# 防止多个并发运行（如果前一个还没结束，排队等）
concurrency:
  group: keepalive-browser
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # 每次最多运行 5 分钟

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer-core

      - name: Run browser keepalive
        env:
          SESSION_DATA: ${{ secrets.SESSION_DATA }}
          TASK_ID: ${{ secrets.TASK_ID }}
        run: node keepalive-browser.js
