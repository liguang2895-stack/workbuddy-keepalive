name: WorkBuddy KeepAlive

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser > /dev/null 2>&1
          npm init -y
          npm install puppeteer-core

      - name: Run diagnosis
        env:
          SESSION_DATA: ${{ secrets.SESSION_DATA }}
          TASK_ID: ${{ secrets.TASK_ID }}
        run: node diagnose.js

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: diagnosis-screenshot
          path: diagnosis.png
          if-no-files-found: warn

  keepalive:
    needs: diagnose
    runs-on: ubuntu-latest
    timeout-minutes: 4320

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser > /dev/null 2>&1
          npm init -y
          npm install puppeteer-core

      - name: Start keepalive
        env:
          SESSION_DATA: ${{ secrets.SESSION_DATA }}
          TASK_ID: ${{ secrets.TASK_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          (sleep 248400; curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GH_REPO/actions/workflows/keepalive.yml/dispatches" \
            -d '{"ref":"master"}') &
          node keepalive-browser.js
